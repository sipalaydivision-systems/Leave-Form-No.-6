<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Diagrams Access</title>
    <style>

            align-items: center;
            justify-content: center;

        }

            background: white;

            text-align: center;

        h1 { color: #003366; font-size: 24px; margin-bottom: 16px; }
        p { color: #555; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }

            display: inline-block;
            padding: 12px 28px;
            background: #003366;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn:hover { background: #002244; }
        .back-link {
            display: block;
            margin-top: 20px;
            color: #003366;
            text-decoration: none;

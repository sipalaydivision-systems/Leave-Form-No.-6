<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password – CS Form No. 6</title>
<script src="/auth-interceptor.js"></script>
<link rel="stylesheet" href="/css/design-tokens.css">
<link rel="stylesheet" href="/css/employee-theme.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    min-height: 100vh;
    background: var(--color-neutral-100, #f5f5f5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-sans, 'Inter', Arial, sans-serif);
    padding: 24px;
}
.card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 40px;
    width: 100%;
    max-width: 440px;
}
.logo { text-align: center; margin-bottom: 24px; }
.logo img {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    margin: 0 auto;
}
.badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #fff3cd;
    color: #856404;
    border: 1px solid #ffc107;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 16px;
}
h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
.subtitle { font-size: 14px; color: #666; margin-bottom: 28px; line-height: 1.5; }

.form-group { margin-bottom: 18px; }
label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
input[type="password"] {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    transition: border-color 0.2s;
    outline: none;
}
input[type="password"]:focus { border-color: #1565c0; }
input[type="password"].error { border-color: #c62828; }

.requirements {
    background: #f8f9fa;
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 20px;
    font-size: 12px;
    color: #555;
    line-height: 1.7;
}
.req { display: flex; align-items: center; gap: 6px; }
.req-icon { font-size: 11px; }
.req.ok .req-icon::before { content: '✓'; color: #2e7d32; }
.req.fail .req-icon::before { content: '✗'; color: #c62828; }
.req.neutral .req-icon::before { content: '·'; color: #999; }

.btn {
    width: 100%;
    padding: 12px;
    background: #1565c0;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
}
.btn:hover { background: #0d47a1; }
.btn:disabled { background: #90a4ae; cursor: not-allowed; }

.error-msg {
    display: none;
    background: #ffebee;
    color: #c62828;
    border: 1px solid #ef9a9a;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 13px;
    margin-bottom: 16px;
}
.success-msg {
    display: none;
    background: #e8f5e9;
    color: #2e7d32;
    border: 1px solid #a5d6a7;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 13px;
    margin-bottom: 16px;
}
</style>
</head>
<body>
<div class="card">
    <div class="logo">
        <img src="/sipalay_logo.png" alt="SDO Sipalay" onerror="this.style.display='none'">
    </div>

    <div style="display:flex;flex-direction:column;align-items:flex-start">
        <span class="badge">⚠ Action Required</span>
    </div>

    <h1>Change Your Password</h1>
    <p class="subtitle">Your password was reset by an administrator. You must set a new password before you can access your account.</p>

    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <form id="change-pw-form" autocomplete="off">
        <div class="form-group">
            <label for="new-password">New Password</label>
            <input type="password" id="new-password" placeholder="Enter new password" autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" placeholder="Re-enter new password" autocomplete="new-password">
        </div>

        <div class="requirements" id="requirements">
            <div class="req neutral" id="req-length"><span class="req-icon"></span> At least 6 characters</div>
            <div class="req neutral" id="req-letter"><span class="req-icon"></span> Contains a letter (a–z, A–Z)</div>
            <div class="req neutral" id="req-number"><span class="req-icon"></span> Contains a number (0–9)</div>
            <div class="req neutral" id="req-special"><span class="req-icon"></span> Contains a special character (!@#$%^&* etc.)</div>
            <div class="req neutral" id="req-match"><span class="req-icon"></span> Passwords match</div>
        </div>

        <button type="submit" class="btn" id="submit-btn" disabled>Set New Password</button>
    </form>
</div>

<script>
(async function () {
    // Verify session and that mustChangePassword is true
    let currentUser;
    try {
        const res = await fetch('/api/me');
        if (!res.ok) { window.location.href = '/'; return; }
        const data = await res.json();
        currentUser = data.user || data;
        // If flag not set, redirect to their dashboard
        if (!currentUser.mustChangePassword) {
            redirectToDashboard(currentUser);
            return;
        }
    } catch (e) { window.location.href = '/'; return; }

    function redirectToDashboard(u) {
        const role = (u.role || u.portal || '').toLowerCase();
        const map = { user: '/dashboard', employee: '/dashboard', ao: '/hr-dashboard', hr: '/admin-officer-approval', asds: '/asds-dashboard', sds: '/sds-dashboard', it: '/it-dashboard' };
        window.location.href = map[role] || '/';
    }

    const newPwEl  = document.getElementById('new-password');
    const confPwEl = document.getElementById('confirm-password');
    const submitBtn = document.getElementById('submit-btn');
    const errorEl  = document.getElementById('error-msg');
    const successEl = document.getElementById('success-msg');

    function showError(msg) { errorEl.textContent = msg; errorEl.style.display = 'block'; successEl.style.display = 'none'; }
    function hideError() { errorEl.style.display = 'none'; }

    function setReq(id, state) { // 'ok' | 'fail' | 'neutral'
        const el = document.getElementById(id);
        if (el) { el.className = 'req ' + state; }
    }

    function validate() {
        const pw = newPwEl.value;
        const confirm = confPwEl.value;
        const ok = {
            length:  pw.length >= 6,
            letter:  /[a-zA-Z]/.test(pw),
            number:  /[0-9]/.test(pw),
            special: /[!@#$%^&*()\-_=+\[\]{};':"\\|,.<>\/?]/.test(pw),
            match:   pw.length > 0 && pw === confirm,
        };
        const state = (key) => pw.length === 0 ? 'neutral' : ok[key] ? 'ok' : 'fail';
        setReq('req-length',  state('length'));
        setReq('req-letter',  state('letter'));
        setReq('req-number',  state('number'));
        setReq('req-special', state('special'));
        setReq('req-match', confirm.length === 0 ? 'neutral' : ok.match ? 'ok' : 'fail');

        const allOk = ok.length && ok.letter && ok.number && ok.special && ok.match;
        submitBtn.disabled = !allOk;
        return allOk;
    }

    newPwEl.addEventListener('input', () => { hideError(); validate(); });
    confPwEl.addEventListener('input', () => { hideError(); validate(); });

    document.getElementById('change-pw-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!validate()) return;

        submitBtn.disabled = true;
        submitBtn.textContent = 'Saving…';
        hideError();

        try {
            const res = await fetch('/api/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    newPassword: newPwEl.value,
                    confirmPassword: confPwEl.value,
                }),
            });
            const data = await res.json();
            if (data.success) {
                successEl.textContent = 'Password changed successfully! Redirecting…';
                successEl.style.display = 'block';
                document.getElementById('change-pw-form').style.display = 'none';
                setTimeout(() => redirectToDashboard(currentUser), 1800);
            } else {
                showError(data.error || 'Failed to change password. Please try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Set New Password';
            }
        } catch (err) {
            showError('Network error. Please check your connection.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Set New Password';
        }
    });
})();
</script>
</body>
</html>

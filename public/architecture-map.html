  var needSettle = false;
  if (saved && saved.nodes && saved.nodes.length > 0 && saved.version === 3) {
    allNodes = saved.nodes;
    allEdges = saved.edges;
    cam = saved.cam || cam;
  } else {
    localStorage.removeItem('archmap2');
    buildFromScratch();
    needSettle = true;
  }

  buildLegend();
  bindEvents();
  if (needSettle) {
    // Run physics settling before first render so layout is stable
    settlePhysics(400);
    physicsOn = false;
    document.getElementById('btnPhysics').textContent = 'Physics: OFF';
    document.getElementById('btnPhysics').classList.remove('active');
    fitAll();
  }
  requestAnimationFrame(loop);
}

function settlePhysics(iterations) {
  // Run physics N times to let the graph settle
  var origPhysics = physicsOn;
  physicsOn = true;
  for (var s = 0; s < iterations; s++) physics();
  physicsOn = origPhysics;
}

function buildFromScratch() {
  var groupKeys = Object.keys(GROUPS);
  var buckets = {};
  var i;
  for (i = 0; i < INIT_NODES.length; i++) {
    var n = INIT_NODES[i];
    if (!buckets[n.group]) buckets[n.group] = [];
    buckets[n.group].push(n);
  }
  allNodes = [];
  // Lay groups out in a 2-row x 5-col grid
  var gridCols = 5;
  var cellW = 600, cellH = 500;
  for (i = 0; i < groupKeys.length; i++) {
    var gk = groupKeys[i];
    var bucket = buckets[gk] || [];
    var gCol = i % gridCols, gRow = Math.floor(i / gridCols);
    var originX = gCol * cellW, originY = gRow * cellH;
    // Arrange nodes inside group in a circle
    var radius = Math.max(60, bucket.length * 18);
    for (var j = 0; j < bucket.length; j++) {
      var angle = (2 * Math.PI * j) / bucket.length - Math.PI / 2;
      var nd = {};
      for (var k in bucket[j]) nd[k] = bucket[j][k];
      nd.x = originX + Math.cos(angle) * radius;
      nd.y = originY + Math.sin(angle) * radius;
      nd.vx = 0; nd.vy = 0; nd.w = 0; nd.h = 0;
      nd.hidden = false; nd.dim = false; nd.pinned = false;
      allNodes.push(nd);
    }
  }
  allEdges = [];
  for (i = 0; i < INIT_EDGES.length; i++) {
    allEdges.push({ id: 'e' + i, from: INIT_EDGES[i][0], to: INIT_EDGES[i][1], label: INIT_EDGES[i][2] || '' });
  }
}

function resize() {
  canvasEl.width = window.innerWidth;
  canvasEl.height = window.innerHeight;
}

function findNode(id) {
  for (var i = 0; i < allNodes.length; i++) if (allNodes[i].id === id) return allNodes[i];
  return null;
}

function screenToWorld(sx, sy) {
  return { x: (sx - canvasEl.width / 2) / cam.zoom + cam.x, y: (sy - canvasEl.height / 2) / cam.zoom + cam.y };
}

function nodeAtScreen(sx, sy) {
  var w = screenToWorld(sx, sy);
  for (var i = allNodes.length - 1; i >= 0; i--) {
    var n = allNodes[i];
    if (n.hidden) continue;
    var hw = (n.w || 80) / 2 + 6, hh = (n.h || 30) / 2 + 6;
    if (w.x >= n.x - hw && w.x <= n.x + hw && w.y >= n.y - hh && w.y <= n.y + hh) return n;
  }
  return null;
}

// EVENTS
function bindEvents() {
  canvasEl.addEventListener('mousedown', onDown);
  canvasEl.addEventListener('mousemove', onMove);
  canvasEl.addEventListener('mouseup', onUp);
  canvasEl.addEventListener('wheel', onWheel);
  canvasEl.addEventListener('contextmenu', onCtx);
  canvasEl.addEventListener('dblclick', onDbl);
  document.addEventListener('keydown', onKey);
  document.getElementById('searchBox').addEventListener('input', onSearch);
  document.addEventListener('click', function(e) { if (!e.target.closest('#ctxmenu')) hideCtx(); });
}

function onDown(e) {
  if (e.button === 2) return;
  var n = nodeAtScreen(e.clientX, e.clientY);
  if (n) {
    if (addEdgeMode) {
      if (!edgeFromNode) {
        edgeFromNode = n; selectedNode = n;
        document.getElementById('modeLabel').textContent = 'Edge from "' + n.label.split('\n')[0] + '" - click target...';
      } else {
        if (n !== edgeFromNode) {
          allEdges.push({ id: 'e' + (nextId++), from: edgeFromNode.id, to: n.id, label: '' });
        }
        edgeFromNode = null; addEdgeMode = false;
        document.getElementById('btnAddEdge').classList.remove('active');
        document.getElementById('modeLabel').textContent = '';
        selectedNode = null;
      }
      return;
    }
    var w = screenToWorld(e.clientX, e.clientY);
    dragInfo = { node: n, offX: w.x - n.x, offY: w.y - n.y };
    selectedNode = n;
    n.vx = 0; n.vy = 0;
  } else {
    panStart = { sx: e.clientX, sy: e.clientY, cx: cam.x, cy: cam.y };
    selectedNode = null;
  }
}

function onMove(e) {
  if (dragInfo) {
    var w = screenToWorld(e.clientX, e.clientY);
    dragInfo.node.x = w.x - dragInfo.offX;
    dragInfo.node.y = w.y - dragInfo.offY;
    dragInfo.node.pinned = true;
  } else if (panStart) {
    cam.x = panStart.cx - (e.clientX - panStart.sx) / cam.zoom;
    cam.y = panStart.cy - (e.clientY - panStart.sy) / cam.zoom;
  }
  var n = nodeAtScreen(e.clientX, e.clientY);
  hoveredNode = n;
  canvasEl.style.cursor = n ? 'pointer' : (panStart ? 'grabbing' : 'default');
  var tt = document.getElementById('tooltip');
  if (n) {
    document.getElementById('ttTitle').textContent = n.label.replace(/\n/g, ' ');
    document.getElementById('ttCat').textContent = (GROUPS[n.group] || {}).label || n.group;
    document.getElementById('ttInfo').textContent = n.info || '';
    tt.style.display = 'block';
    tt.style.left = Math.min(e.clientX + 14, window.innerWidth - 310) + 'px';
    tt.style.top = Math.min(e.clientY + 14, window.innerHeight - 80) + 'px';
  } else {
    tt.style.display = 'none';
  }
}

function onUp() {
  if (dragInfo) dragInfo.node.pinned = false;
  dragInfo = null; panStart = null;
}

function onWheel(e) {
  e.preventDefault();
  var factor = e.deltaY < 0 ? 1.12 : 0.89;
  var nz = Math.max(0.06, Math.min(4, cam.zoom * factor));
  var w1 = screenToWorld(e.clientX, e.clientY);
  cam.zoom = nz;
  var w2 = screenToWorld(e.clientX, e.clientY);
  cam.x -= (w2.x - w1.x);
  cam.y -= (w2.y - w1.y);
}

function onDbl(e) {
  var n = nodeAtScreen(e.clientX, e.clientY);
  if (n) editNodePanel(n.id);
}

function onKey(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedNode) { removeNode(selectedNode.id); selectedNode = null; }
  if (e.key === 'Escape') {
    addEdgeMode = false; edgeFromNode = null; closePanel(); hideCtx();
    document.getElementById('btnAddEdge').classList.remove('active');
    document.getElementById('modeLabel').textContent = '';
  }
  if (e.ctrlKey && e.key === 'f') { e.preventDefault(); document.getElementById('searchBox').focus(); }
}

function onCtx(e) {
  e.preventDefault();
  var n = nodeAtScreen(e.clientX, e.clientY);
  var menu = document.getElementById('ctxmenu');
  if (n) {
    menu.innerHTML = '<div class="ctx-item" onclick="editNodePanel(\'' + n.id + '\')">Edit Node</div>' +
      '<div class="ctx-item" onclick="highlightConnected(\'' + n.id + '\')">Highlight Connected</div>' +
      '<div class="ctx-item" onclick="focusNode(\'' + n.id + '\')">Focus</div>' +
      '<div class="ctx-item" onclick="duplicateNode(\'' + n.id + '\')">Duplicate</div>' +
      '<div class="ctx-item danger" onclick="removeNode(\'' + n.id + '\')">Delete</div>';
  } else {
    var wp = screenToWorld(e.clientX, e.clientY);
    menu.innerHTML = '<div class="ctx-item" onclick="addNodeAt(' + wp.x + ',' + wp.y + ')">+ Add Node Here</div>' +
      '<div class="ctx-item" onclick="fitAll()">Fit All</div>' +
      '<div class="ctx-item" onclick="saveToStorage()">Save Layout</div>';
  }
  menu.style.display = 'block';
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
}
function hideCtx() { document.getElementById('ctxmenu').style.display = 'none'; }

// PHYSICS
function physics() {
  if (!physicsOn) return;
  var vis = [];
  var nodeMap = {};
  var i, j;
  for (i = 0; i < allNodes.length; i++) {
    var n = allNodes[i];
    nodeMap[n.id] = n;
    if (!n.hidden) vis.push(n);
  }
  // Same-group attraction: pull nodes toward their group centroid lightly
  var groupCentroids = {};
  for (i = 0; i < vis.length; i++) {
    var g = vis[i].group;
    if (!groupCentroids[g]) groupCentroids[g] = { sx: 0, sy: 0, c: 0 };
    groupCentroids[g].sx += vis[i].x; groupCentroids[g].sy += vis[i].y; groupCentroids[g].c++;
  }
  for (i = 0; i < vis.length; i++) {
    var gc = groupCentroids[vis[i].group];
    if (!gc || gc.c < 2) continue;
    var gcx = gc.sx / gc.c, gcy = gc.sy / gc.c;
    if (!vis[i].pinned && !(dragInfo && dragInfo.node === vis[i])) {
      vis[i].vx += (gcx - vis[i].x) * 0.003;
      vis[i].vy += (gcy - vis[i].y) * 0.003;
    }
  }
  // Repulsion — stronger between different groups to separate clusters
  for (i = 0; i < vis.length; i++) {
    for (j = i + 1; j < vis.length; j++) {
      var a = vis[i], b = vis[j];
      var dx = b.x - a.x, dy = b.y - a.y;
      var dist = Math.sqrt(dx * dx + dy * dy) || 1;
      if (dist > 1200) continue;
      var sameGroup = a.group === b.group;
      var repStr = sameGroup ? -15000 : -50000;
      var force = repStr / (dist * dist);
      var fx = (dx / dist) * force, fy = (dy / dist) * force;
      if (!a.pinned && !(dragInfo && dragInfo.node === a)) { a.vx -= fx; a.vy -= fy; }
      if (!b.pinned && !(dragInfo && dragInfo.node === b)) { b.vx += fx; b.vy += fy; }
    }
  }
  // Springs — connected nodes pull together
  for (i = 0; i < allEdges.length; i++) {
    var e = allEdges[i];
    var ea = nodeMap[e.from], eb = nodeMap[e.to];
    if (!ea || !eb || ea.hidden || eb.hidden) continue;
    var edx = eb.x - ea.x, edy = eb.y - ea.y;
    var edist = Math.sqrt(edx * edx + edy * edy) || 1;
    var eforce = (edist - 180) * 0.006;
    var efx = (edx / edist) * eforce, efy = (edy / edist) * eforce;
    if (!ea.pinned && !(dragInfo && dragInfo.node === ea)) { ea.vx += efx; ea.vy += efy; }
    if (!eb.pinned && !(dragInfo && dragInfo.node === eb)) { eb.vx -= efx; eb.vy -= efy; }
  }
  // Center gravity + damping
  for (i = 0; i < vis.length; i++) {
    var nd = vis[i];
    if (nd.pinned || (dragInfo && dragInfo.node === nd)) continue;
    nd.vx -= nd.x * 0.00012;
    nd.vy -= nd.y * 0.00012;
    nd.vx *= 0.78; nd.vy *= 0.78;
    nd.x += nd.vx; nd.y += nd.vy;
  }
}

// RENDER
function loop() {
  physics();
  render();
  updateStatus();
  requestAnimationFrame(loop);
}

function render() {
  var W = canvasEl.width, H = canvasEl.height;
  cx.fillStyle = '#0f1117';
  cx.fillRect(0, 0, W, H);
  cx.save();
  cx.translate(W / 2, H / 2);
  cx.scale(cam.zoom, cam.zoom);
  cx.translate(-cam.x, -cam.y);

  var nodeMap = {};
  var i;
  for (i = 0; i < allNodes.length; i++) nodeMap[allNodes[i].id] = allNodes[i];

  // Group boundary boxes
  drawGroupBoundaries();

  // Edges
  for (i = 0; i < allEdges.length; i++) {
    var e = allEdges[i];
    var a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b || a.hidden || b.hidden) continue;
    var isHL = hoveredNode && (hoveredNode.id === a.id || hoveredNode.id === b.id);
    var isSel = selectedNode && (selectedNode.id === a.id || selectedNode.id === b.id);
    var bright = isHL || isSel;

    cx.beginPath();
    cx.moveTo(a.x, a.y);
    var emx = (a.x + b.x) / 2, emy = (a.y + b.y) / 2;
    var edx = b.x - a.x, edy = b.y - a.y;
    var ecx = emx - edy * 0.06, ecy = emy + edx * 0.06;
    cx.quadraticCurveTo(ecx, ecy, b.x, b.y);
    cx.strokeStyle = bright ? '#58a6ff' : (a.dim || b.dim ? 'rgba(48,54,61,0.15)' : 'rgba(88,100,115,0.55)');
    cx.lineWidth = bright ? 3 : 1.5;
    cx.stroke();

    // Arrow
    var t = 0.82;
    var ax2 = (1-t)*(1-t)*a.x + 2*(1-t)*t*ecx + t*t*b.x;
    var ay2 = (1-t)*(1-t)*a.y + 2*(1-t)*t*ecy + t*t*b.y;
    var tx2 = 2*(1-t)*(ecx-a.x) + 2*t*(b.x-ecx);
    var ty2 = 2*(1-t)*(ecy-a.y) + 2*t*(b.y-ecy);
    var ang = Math.atan2(ty2, tx2);
    var aSize = bright ? 10 : 7;
    cx.beginPath();
    cx.moveTo(ax2, ay2);
    cx.lineTo(ax2 - aSize * Math.cos(ang - 0.4), ay2 - aSize * Math.sin(ang - 0.4));
    cx.lineTo(ax2 - aSize * Math.cos(ang + 0.4), ay2 - aSize * Math.sin(ang + 0.4));
    cx.closePath();
    cx.fillStyle = bright ? '#58a6ff' : 'rgba(88,100,115,0.55)';
    cx.fill();

    // Label
    if (e.label && cam.zoom > 0.18) {
      cx.font = Math.round(10 / Math.max(cam.zoom, 0.3)) + 'px Segoe UI';
      cx.fillStyle = bright ? '#8bb9fe' : 'rgba(72,79,88,0.5)';
      cx.textAlign = 'center';
      cx.fillText(e.label, (a.x + b.x) / 2, (a.y + b.y) / 2 - 8);
    }
  }

  // Nodes
  for (i = 0; i < allNodes.length; i++) {
    var n = allNodes[i];
    if (n.hidden) continue;
    var grp = GROUPS[n.group] || GROUPS.custom;
    var lines = (n.label || '').split('\n');
    var fontSize = 13;
    cx.font = '600 ' + fontSize + 'px Segoe UI';
    var maxW = 0;
    for (var li = 0; li < lines.length; li++) {
      var mw = cx.measureText(lines[li]).width;
      if (mw > maxW) maxW = mw;
    }
    var padX = 18, padY = 12;
    n.w = maxW + padX * 2;
    n.h = lines.length * (fontSize + 5) + padY * 2;

    var nHL = hoveredNode === n || selectedNode === n;
    var alpha = n.dim ? 0.12 : 1;
    cx.globalAlpha = alpha;

    var nx = n.x - n.w / 2, ny = n.y - n.h / 2;

    if (n.group === 'dataFile') {
      drawCylinder(n.x, n.y, n.w, n.h, grp.color, nHL);
    } else if (n.group === 'scheduled') {
      drawDiamond(n.x, n.y, n.w, n.h, grp.color, nHL);
    } else {
      drawRoundRect(nx, ny, n.w, n.h, 8, grp.color, nHL);
    }

    // Text
    cx.fillStyle = n.dim ? 'rgba(225,228,232,0.2)' : '#e1e4e8';
    cx.textAlign = 'center';
    cx.textBaseline = 'middle';
    for (li = 0; li < lines.length; li++) {
      var ly = n.y - ((lines.length - 1) * (fontSize + 5)) / 2 + li * (fontSize + 5);
      cx.font = (li === 0 ? '600 ' : '') + (li === 0 ? fontSize : fontSize - 1) + 'px Segoe UI';
      cx.fillText(lines[li], n.x, ly);
    }
    cx.globalAlpha = 1;
  }

  cx.restore();
}

function drawGroupBoundaries() {
  var groupBounds = {};
  var gk, i;
  for (i = 0; i < allNodes.length; i++) {
    var n = allNodes[i];
    if (n.hidden || n.dim) continue;
    gk = n.group;
    var hw = (n.w || 120) / 2 + 10, hh = (n.h || 40) / 2 + 10;
    if (!groupBounds[gk]) groupBounds[gk] = { minX: Infinity, maxX: -Infinity, minY: Infinity, maxY: -Infinity, count: 0 };
    var gb = groupBounds[gk];
    gb.count++;
    if (n.x - hw < gb.minX) gb.minX = n.x - hw;
    if (n.x + hw > gb.maxX) gb.maxX = n.x + hw;
    if (n.y - hh < gb.minY) gb.minY = n.y - hh;
    if (n.y + hh > gb.maxY) gb.maxY = n.y + hh;
  }
  var keys = Object.keys(GROUPS);
  for (i = 0; i < keys.length; i++) {
    gk = keys[i];
    var gb = groupBounds[gk];
    if (!gb || gb.count < 1) continue;
    var grp = GROUPS[gk];
    var pad = 30;
    var bx = gb.minX - pad, by = gb.minY - pad - 28;
    var bw = gb.maxX - gb.minX + pad * 2, bh = gb.maxY - gb.minY + pad * 2 + 28;
    var r = 14;
    // Background fill
    cx.beginPath();
    cx.moveTo(bx + r, by);
    cx.lineTo(bx + bw - r, by); cx.arcTo(bx + bw, by, bx + bw, by + r, r);
    cx.lineTo(bx + bw, by + bh - r); cx.arcTo(bx + bw, by + bh, bx + bw - r, by + bh, r);
    cx.lineTo(bx + r, by + bh); cx.arcTo(bx, by + bh, bx, by + bh - r, r);
    cx.lineTo(bx, by + r); cx.arcTo(bx, by, bx + r, by, r);
    cx.closePath();
    cx.fillStyle = grp.color + '0a';
    cx.fill();
    cx.strokeStyle = grp.color + '30';
    cx.lineWidth = 2;
    cx.setLineDash([6, 4]);
    cx.stroke();
    cx.setLineDash([]);
    // Group label at top-left inside the box
    cx.font = '700 15px Segoe UI';
    cx.fillStyle = grp.color + 'cc';
    cx.textAlign = 'left';
    cx.textBaseline = 'top';
    cx.fillText(grp.label + ' (' + gb.count + ')', bx + 14, by + 8);
  }
}

function drawRoundRect(x, y, w, h, r, color, hl) {
  cx.beginPath();
  cx.moveTo(x + r, y);
  cx.lineTo(x + w - r, y); cx.arcTo(x + w, y, x + w, y + r, r);
  cx.lineTo(x + w, y + h - r); cx.arcTo(x + w, y + h, x + w - r, y + h, r);
  cx.lineTo(x + r, y + h); cx.arcTo(x, y + h, x, y + h - r, r);
  cx.lineTo(x, y + r); cx.arcTo(x, y, x + r, y, r);
  cx.closePath();
  cx.fillStyle = hl ? color + '55' : color + '20';
  cx.fill();
  cx.strokeStyle = hl ? color : color + '99';
  cx.lineWidth = hl ? 2.5 : 1.5;
  cx.stroke();
}

function drawCylinder(cxp, cy, w, h, color, hl) {
  var x = cxp - w/2, y = cy - h/2, ry = Math.min(h * 0.2, 10);
  cx.beginPath();
  cx.ellipse(cxp, y + ry, w/2, ry, 0, Math.PI, 2 * Math.PI);
  cx.lineTo(x + w, y + h - ry);
  cx.ellipse(cxp, y + h - ry, w/2, ry, 0, 0, Math.PI);
  cx.lineTo(x, y + ry);
  cx.closePath();
  cx.fillStyle = hl ? color + '55' : color + '20';
  cx.fill();
  cx.strokeStyle = hl ? color : color + '99';
  cx.lineWidth = hl ? 2.5 : 1.5;
  cx.stroke();
  cx.beginPath();
  cx.ellipse(cxp, y + ry, w/2, ry, 0, 0, 2 * Math.PI);
  cx.fillStyle = hl ? color + '44' : color + '15';
  cx.fill();
  cx.stroke();
}

function drawDiamond(cxp, cy, w, h, color, hl) {
  var hw = w/2 + 8, hh = h/2 + 8;
  cx.beginPath();
  cx.moveTo(cxp, cy - hh);
  cx.lineTo(cxp + hw, cy);
  cx.lineTo(cxp, cy + hh);
  cx.lineTo(cxp - hw, cy);
  cx.closePath();
  cx.fillStyle = hl ? color + '55' : color + '20';
  cx.fill();
  cx.strokeStyle = hl ? color : color + '99';
  cx.lineWidth = hl ? 2.5 : 1.5;
  cx.stroke();
}

// LEGEND
function buildLegend() {
  var html = '';
  var keys = Object.keys(GROUPS);
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i], v = GROUPS[k];
    var cnt = 0;
    for (var j = 0; j < allNodes.length; j++) if (allNodes[j].group === k) cnt++;
    html += '<div class="legend-row' + (hiddenGroups[k] ? ' hidden' : '') + '" data-g="' + k + '" onclick="toggleGroup(\'' + k + '\')">' +
      '<div class="legend-dot" style="background:' + v.color + '"></div><span>' + v.label + ' (' + cnt + ')</span></div>';
  }
  document.getElementById('legendItems').innerHTML = html;
}

function toggleGroup(g) {
  hiddenGroups[g] = !hiddenGroups[g];
  for (var i = 0; i < allNodes.length; i++) {
    if (allNodes[i].group === g) allNodes[i].hidden = !!hiddenGroups[g];
  }
  buildLegend();
}

// SEARCH
function onSearch(e) {
  var q = e.target.value.toLowerCase().trim();
  for (var i = 0; i < allNodes.length; i++) {
    var n = allNodes[i];
    n.dim = q ? !((n.label||'').toLowerCase().indexOf(q)>=0 || (n.info||'').toLowerCase().indexOf(q)>=0 || (n.group||'').toLowerCase().indexOf(q)>=0) : false;
  }
}

// TOOLBAR
function fitAll() {
  var vis = [];
  for (var i = 0; i < allNodes.length; i++) if (!allNodes[i].hidden) vis.push(allNodes[i]);
  if (!vis.length) return;
  var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (i = 0; i < vis.length; i++) {
    var n = vis[i];
    var nw = (n.w || 140) / 2 + 20, nh = (n.h || 50) / 2 + 20;
    if (n.x - nw < minX) minX = n.x - nw;
    if (n.x + nw > maxX) maxX = n.x + nw;
    if (n.y - nh < minY) minY = n.y - nh;
    if (n.y + nh > maxY) maxY = n.y + nh;
  }
  cam.x = (minX + maxX) / 2;
  cam.y = (minY + maxY) / 2;
  // Use only 85% of canvas for padding (toolbar + legend)
  var usableW = canvasEl.width * 0.85;
  var usableH = (canvasEl.height - 40) * 0.85;
  var sx = usableW / (maxX - minX);
  var sy = usableH / (maxY - minY);
  cam.zoom = Math.max(0.15, Math.min(1.5, Math.min(sx, sy)));
}

function togglePhysics() {
  physicsOn = !physicsOn;
  var btn = document.getElementById('btnPhysics');
  btn.textContent = 'Physics: ' + (physicsOn ? 'ON' : 'OFF');
  if (physicsOn) btn.classList.add('active'); else btn.classList.remove('active');
}

function toggleAddEdge() {
  addEdgeMode = !addEdgeMode; edgeFromNode = null;
  if (addEdgeMode) document.getElementById('btnAddEdge').classList.add('active');
  else document.getElementById('btnAddEdge').classList.remove('active');
  document.getElementById('modeLabel').textContent = addEdgeMode ? 'Click source node...' : '';
}

function exportPNG() {
  var link = document.createElement('a');
  link.download = 'architecture-map.png';
  link.href = canvasEl.toDataURL('image/png');
  link.click();
}

function saveToStorage() {
  localStorage.setItem('archmap2', JSON.stringify({ version: 3, nodes: allNodes, edges: allEdges, cam: cam }));
  flashMsg('Saved to browser storage');
}

function resetAll() {
  if (!confirm('Reset everything to default?')) return;
  localStorage.removeItem('archmap2');
  location.reload();
}

// NODE OPS
function addNodePanel() {
  var opts = '';
  var keys = Object.keys(GROUPS);
  for (var i = 0; i < keys.length; i++) opts += '<option value="' + keys[i] + '">' + GROUPS[keys[i]].label + '</option>';
  openPanel('Add Node',
    '<div class="field"><label>Name</label><input id="pName" placeholder="myFunction"></div>' +
    '<div class="field"><label>Line / Subtitle</label><input id="pLine" placeholder="L1234"></div>' +
    '<div class="field"><label>Group</label><select id="pGroup">' + opts + '</select></div>' +
    '<div class="field"><label>Description</label><textarea id="pInfo" placeholder="What does this do?"></textarea></div>',
    '<button class="tb-btn btn-primary" onclick="doAddNode()">Add</button><button class="tb-btn" onclick="closePanel()">Cancel</button>');
}

function addNodeAt(wx, wy) {
  hideCtx();
  addNodePanel();
  window._pp = { x: wx, y: wy };
}

function doAddNode() {
  var name = document.getElementById('pName').value.trim();
  if (!name) return;
  var line = document.getElementById('pLine').value.trim();
  var group = document.getElementById('pGroup').value;
  var info = document.getElementById('pInfo').value.trim();
  var pos = window._pp || { x: cam.x + (Math.random()-0.5)*200, y: cam.y + (Math.random()-0.5)*200 };
  delete window._pp;
  allNodes.push({ id: 'c' + (nextId++), label: line ? name+'\n'+line : name, group: group, info: info, x: pos.x, y: pos.y, vx:0, vy:0, w:0, h:0, hidden:false, dim:false, pinned:false });
  closePanel(); buildLegend();
}

function editNodePanel(nodeId) {
  hideCtx();
  var n = findNode(nodeId);
  if (!n) return;
  var parts = (n.label||'').split('\n');
  var opts = '';
  var keys = Object.keys(GROUPS);
  for (var i = 0; i < keys.length; i++) opts += '<option value="' + keys[i] + '"' + (keys[i]===n.group?' selected':'') + '>' + GROUPS[keys[i]].label + '</option>';
  openPanel('Edit Node',
    '<div class="field"><label>Name</label><input id="pName" value="' + esc(parts[0]||'') + '"></div>' +
    '<div class="field"><label>Line / Subtitle</label><input id="pLine" value="' + esc(parts.slice(1).join('\n')) + '"></div>' +
    '<div class="field"><label>Group</label><select id="pGroup">' + opts + '</select></div>' +
    '<div class="field"><label>Description</label><textarea id="pInfo">' + esc(n.info||'') + '</textarea></div>',
    '<button class="tb-btn btn-primary" onclick="doEditNode(\'' + nodeId + '\')">Save</button><button class="tb-btn" onclick="closePanel()">Cancel</button>');
}

function doEditNode(nodeId) {
  var n = findNode(nodeId);
  if (!n) return;
  var name = document.getElementById('pName').value.trim();
  var line = document.getElementById('pLine').value.trim();
  n.label = line ? name+'\n'+line : name;
  n.group = document.getElementById('pGroup').value;
  n.info = document.getElementById('pInfo').value.trim();
  closePanel();
}

function removeNode(nodeId) {
  hideCtx();
  var newNodes = [], newEdges = [];
  for (var i = 0; i < allNodes.length; i++) if (allNodes[i].id !== nodeId) newNodes.push(allNodes[i]);
  for (i = 0; i < allEdges.length; i++) if (allEdges[i].from !== nodeId && allEdges[i].to !== nodeId) newEdges.push(allEdges[i]);
  allNodes = newNodes; allEdges = newEdges;
  buildLegend();
}

function duplicateNode(nodeId) {
  hideCtx();
  var n = findNode(nodeId);
  if (!n) return;
  var nd = {};
  for (var k in n) nd[k] = n[k];
  nd.id = 'c' + (nextId++);
  nd.x = n.x + 60; nd.y = n.y + 60; nd.vx = 0; nd.vy = 0;
  allNodes.push(nd);
  buildLegend();
}

function highlightConnected(nodeId) {
  hideCtx();
  var conn = {};
  conn[nodeId] = true;
  for (var i = 0; i < allEdges.length; i++) {
    if (allEdges[i].from === nodeId) conn[allEdges[i].to] = true;
    if (allEdges[i].to === nodeId) conn[allEdges[i].from] = true;
  }
  for (i = 0; i < allNodes.length; i++) allNodes[i].dim = !conn[allNodes[i].id];
  setTimeout(function() { for (var i = 0; i < allNodes.length; i++) allNodes[i].dim = false; }, 4000);
}

function focusNode(nodeId) {
  hideCtx();
  var n = findNode(nodeId);
  if (!n) return;
  cam.x = n.x; cam.y = n.y; cam.zoom = 1.2;
  highlightConnected(nodeId);
}

// PANEL
function openPanel(title, body, actions) {
  document.getElementById('panelTitle').textContent = title;
  document.getElementById('panelBody').innerHTML = body;
  document.getElementById('panelActions').innerHTML = actions;
  document.getElementById('panel').classList.add('open');
}
function closePanel() { document.getElementById('panel').classList.remove('open'); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function updateStatus() {
  var vis = 0;
  for (var i = 0; i < allNodes.length; i++) if (!allNodes[i].hidden) vis++;
  document.getElementById('status').textContent = vis + '/' + allNodes.length + ' nodes | ' + allEdges.length + ' edges | Scroll=zoom Drag=move DblClick=edit RightClick=menu';
}

function flashMsg(msg) {
  var s = document.getElementById('status');
  s.textContent = msg; s.style.color = '#3fb950';
  setTimeout(function() { s.style.color = '#8b949e'; }, 2000);
}

// START
init();
</script>
</body>
</html>
